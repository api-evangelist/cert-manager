apis:
- aid: cert-manager:cert-manager-api
  name: cert-manager Kubernetes API
  description: >-
    The cert-manager API extends the Kubernetes API with custom resources
    including Certificate, Issuer, ClusterIssuer, CertificateRequest, and
    Order. These resources allow declarative management of TLS certificates,
    automatic renewal, and integration with ACME and other certificate
    authorities directly through kubectl and Kubernetes manifests.
  humanURL: https://cert-manager.io/docs/
  properties:
  - type: Documentation
    url: https://cert-manager.io/docs/
  tags:
  - Certificates
  - Kubernetes API
  - TLS
- aid: cert-manager:cmctl-cli
  name: cert-manager CLI (cmctl)
  description: >-
    cmctl is the command-line tool for managing cert-manager resources. It
    provides commands for checking certificate status, manually triggering
    renewals, approving or denying certificate requests, and converting
    cert-manager resources between API versions.
  humanURL: https://cert-manager.io/docs/reference/cmctl/
  properties:
