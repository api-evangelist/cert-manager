    url: https://github.com/cert-manager/cmctl/releases
  tags:
  - CLI
  - Certificate Management
- aid: cert-manager:trust-manager
  name: trust-manager
  description: >-
    trust-manager is a cert-manager companion project for managing TLS trust
    bundles in Kubernetes and OpenShift clusters. It distributes CA bundles
    via a Bundle custom resource to namespaces and workloads, ensuring that
    applications have access to an up-to-date set of trusted CA certificates
    without manual maintenance.
  humanURL: https://cert-manager.io/docs/trust/trust-manager/
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  properties:
