  - type: GitHubRepository
    url: https://github.com/cert-manager/trust-manager
  - type: Change Log
    url: https://github.com/cert-manager/trust-manager/releases
  tags:
  - Trust Bundles
  - TLS
  - Kubernetes
- aid: cert-manager:approver-policy
  name: cert-manager approver-policy
  description: >-
    approver-policy is a cert-manager policy plugin that automatically
    approves or denies CertificateRequest resources based on defined
    CertificateRequestPolicy custom resources. It provides fine-grained
    control over which certificate requests are permitted, including
    constraints on allowed DNS names, key usages, and issuers.
  humanURL: https://cert-manager.io/docs/policy/approval/approver-policy/
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  properties:
  - type: Documentation
    url: https://cert-manager.io/docs/policy/approval/approver-policy/
  - type: GitHubRepository
    url: https://github.com/cert-manager/approver-policy
  - type: Change Log
    url: https://github.com/cert-manager/approver-policy/releases
  tags:
  - Policy
  - Certificate Approval
  - Security
- aid: cert-manager:csi-driver
  name: cert-manager csi-driver
  description: >-
    csi-driver is a Kubernetes Container Storage Interface plugin that
    works alongside cert-manager to seamlessly request and mount certificate
    key pairs as ephemeral volumes directly into pods. It enables workloads
    to automatically obtain short-lived certificates at pod startup without
    requiring manual secret management.
  humanURL: https://cert-manager.io/docs/usage/csi-driver/
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  properties:
  - type: Documentation
    url: https://cert-manager.io/docs/usage/csi-driver/
  tags:
  - CSI
  - Kubernetes
  - Certificate Management
- aid: cert-manager:csi-driver-spiffe
  name: cert-manager csi-driver-spiffe
  description: >-
    csi-driver-spiffe is a Kubernetes CSI plugin that works alongside
    cert-manager to transparently deliver SPIFFE SVIDs as X.509 certificate
    key pairs to mounted pods using ephemeral volumes. It allows all pods
    running in a Kubernetes cluster to automatically receive SPIFFE identity
    documents from a configured Trust Domain.
  humanURL: https://cert-manager.io/docs/usage/csi-driver-spiffe/
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  properties:
  - type: Documentation
    url: https://cert-manager.io/docs/usage/csi-driver-spiffe/
  - type: Getting Started
    url: https://cert-manager.io/docs/usage/csi-driver-spiffe/installation/
  tags:
  - SPIFFE
  - CSI
  - Identity
  - Kubernetes
