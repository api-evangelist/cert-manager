aid: cert-manager
name: Cert-Manager
description: >-
  cert-manager is a powerful and extensible X.509 certificate controller for
  Kubernetes and OpenShift workloads. It obtains certificates from a variety
  of issuers, including Let's Encrypt, HashiCorp Vault, and Venafi, and
  ensures certificates are valid and up-to-date, attempting to renew them
  before expiry. It supports certificate issuance for Ingress, Gateway API,
  and arbitrary workloads via Certificate resources.
url: https://cert-manager.io
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Certificates
- TLS
- Kubernetes
- Security
- Cloud Native
- Graduated
created: '2026-03-16'
modified: '2026-03-18'
specificationVersion: '0.19'
